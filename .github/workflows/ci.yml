name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  frontend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: native
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: native/package-lock.json
      - run: npm ci
      - name: TypeScript check
        run: npm run typecheck
      - name: Expo doctor (informational — does not fail the build)
        run: npm run doctor || true
        continue-on-error: true

  backend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: compass
          POSTGRES_PASSWORD: test_password
          POSTGRES_DB: compass_test
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: backend/pyproject.toml

      - name: Install dependencies
        run: pip install -e ".[dev]"

      - name: Lint
        run: ruff check app/

      - name: Type check
        run: mypy app/ --ignore-missing-imports

      - name: Test
        env:
          DATABASE_URL: postgresql+asyncpg://compass:test_password@localhost:5432/compass_test
          SECRET_KEY: test-secret-key-at-least-32-characters-long
          ADMIN_KEY: test-admin-key-16-chars-min
        run: pytest tests/ -v
