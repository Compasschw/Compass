name: Deploy to EC2

# Triggers:
#   - Auto-deploy on every push to main (after CI runs in parallel)
#   - Manual deploy via the "Run workflow" button in the Actions tab —
#     useful for redeploying without a code change (e.g. rotating env vars
#     and restarting, or recovering from a failed prior deploy).
on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      skip_migrations:
        description: 'Skip alembic upgrade head (use only if you ran migrations manually)'
        required: false
        default: 'false'
        type: choice
        options: ['false', 'true']

# Avoid stacking deploys: if a new push lands while one is mid-deploy,
# the older run is cancelled in favour of the latest commit.
concurrency:
  group: deploy-production
  cancel-in-progress: false

jobs:
  deploy:
    name: Deploy backend to production EC2
    runs-on: ubuntu-latest
    # Skip deploy commits to avoid loops if anything ever auto-commits.
    if: "!contains(github.event.head_commit.message, '[skip deploy]')"

    steps:
      - name: SSH to EC2 and run deploy script
        uses: appleboy/ssh-action@v1.2.0
        with:
          host:       ${{ secrets.EC2_HOST }}
          username:   ${{ secrets.EC2_USERNAME }}
          key:        ${{ secrets.EC2_SSH_KEY }}
          port:       22
          # 30 min cap — covers a slow `docker compose build` plus the
          # pre-migration RDS snapshot wait (incremental snapshots normally
          # finish in 1-5 min; first-ever snapshot can take longer).
          command_timeout: 30m
          # script_stop intentionally OFF: it intercepts non-zero returns from
          # `[ ]` test conditions inside `if` blocks (false-positive abort).
          # Strict-mode is still enforced by `set -euo pipefail` at the top of
          # the embedded script, so true failures abort correctly.
          script_stop: false
          # Pass the manual-dispatch input through to the remote shell.
          envs: SKIP_MIGRATIONS
          script: |
            set -euo pipefail

            PROJECT_DIR="${{ secrets.EC2_PROJECT_PATH }}"
            cd "$PROJECT_DIR"

            RDS_INSTANCE_ID="compass-prod"
            AWS_REGION="us-west-2"

            echo "::group::Step 1/6 — git pull origin main"
            git fetch origin main
            git reset --hard origin/main
            git --no-pager log -1 --oneline
            echo "::endgroup::"

            echo "::group::Step 1b/6 — hydrate secrets from SSM Parameter Store"
            # Deploy-time secret hydration: pull SecureString params from SSM and
            # upsert them into .env BEFORE the container starts, so SSM is the
            # encrypted source-of-truth (rotate in one place, redeploy to apply).
            # Safe-by-default: if a param is absent, or the AWS CLI / instance
            # role isn't set up, that key is skipped and the existing .env value
            # is left untouched — a genuine no-op until the params exist. Secret
            # VALUES are never echoed to the deploy log (only key names).
            SSM_PREFIX="/compass/prod"
            SSM_KEYS="STRIPE_SECRET_KEY STRIPE_WEBHOOK_SECRET STRIPE_PLATFORM_WEBHOOK_SECRET VONAGE_SMS_NUMBER MEMBER_CSV_ENABLED S3_BUCKET_MEMBER_CSV"
            if command -v aws >/dev/null 2>&1; then
              touch .env
              for KEY in $SSM_KEYS; do
                VAL=$(aws ssm get-parameter --name "$SSM_PREFIX/$KEY" --with-decryption \
                  --region "$AWS_REGION" --query 'Parameter.Value' --output text 2>/dev/null || true)
                if [ -n "$VAL" ] && [ "$VAL" != "None" ]; then
                  # Upsert without sed (secret values may contain sed-special
                  # chars): drop any existing line for KEY, then append fresh.
                  grep -vE "^${KEY}=" .env > .env.tmp 2>/dev/null || true
                  printf '%s=%s\n' "$KEY" "$VAL" >> .env.tmp
                  mv .env.tmp .env
                  chmod 600 .env
                  echo "  hydrated ${KEY} from SSM"
                else
                  echo "  ${KEY} not in SSM — leaving .env as-is"
                fi
              done
            else
              echo "  AWS CLI not present — skipping SSM hydration"
            fi
            echo "::endgroup::"

            echo "::group::Step 2/6 — docker compose build + up"
            # --build rebuilds any image whose layer inputs changed.
            # --no-deps keeps unaffected services running for fewer seconds of downtime.
            docker compose up -d --build
            echo "::endgroup::"

            echo "::group::Step 3/6 — wait for backend health"
            # Give the api container ~20s for uvicorn + DB connect on cold start.
            # `--retry-all-errors` covers curl 56 (connection reset) when the
            # socket is accepted before the app is ready.
            sleep 20
            curl --retry 6 --retry-delay 4 --retry-connrefused --retry-all-errors -fsS http://localhost:8000/api/v1/health \
              || (echo "Backend health check failed — dumping last 60 lines of api logs:" \
                  && docker compose logs --tail=60 api && exit 1)
            echo "::endgroup::"

            echo "::group::Step 4/6 — pre-migration RDS snapshot"
            # Safety gate (audit 2026-06-12 blocker #6): never run migrations
            # against compass-prod without a restorable snapshot. The June
            # audio-path collision incident is why this is non-negotiable.
            # Skipped only when there is nothing to migrate.
            if [ "${SKIP_MIGRATIONS:-false}" = "true" ]; then
              echo "Migrations skipped via workflow input — snapshot not needed."
            else
              # Revision ids are 12-char lowercase alphanumerics (NOT hex-only
              # in this repo — e.g. k1b2c3d4e5f7), one per line, "(head)" suffix.
              ALEMBIC_CURRENT=$(docker compose exec -T -e PYTHONPATH=/code api alembic current 2>/dev/null | awk '/^[0-9a-z]{8,}/ {print $1}' | sort)
              ALEMBIC_HEADS=$(docker compose exec -T -e PYTHONPATH=/code api alembic heads 2>/dev/null | awk '/^[0-9a-z]{8,}/ {print $1}' | sort)
              if [ "$ALEMBIC_CURRENT" = "$ALEMBIC_HEADS" ] && [ -n "$ALEMBIC_HEADS" ]; then
                echo "DB already at head ($ALEMBIC_HEADS) — no pending migrations, snapshot skipped."
              else
                if ! command -v aws >/dev/null 2>&1; then
                  echo "::error::Pending migrations but the AWS CLI is not installed on this host."
                  echo "Install it (e.g. 'sudo apt-get install -y awscli' / 'sudo dnf install -y awscli')"
                  echo "or re-run with skip_migrations=true AFTER taking a manual snapshot."
                  exit 1
                fi
                SNAPSHOT_ID="${RDS_INSTANCE_ID}-pre-mig-$(date -u +%Y%m%d-%H%M%S)-$(git rev-parse --short HEAD)"
                echo "Creating snapshot ${SNAPSHOT_ID} ..."
                aws rds create-db-snapshot \
                  --region "$AWS_REGION" \
                  --db-instance-identifier "$RDS_INSTANCE_ID" \
                  --db-snapshot-identifier "$SNAPSHOT_ID" >/dev/null
                echo "Waiting for snapshot to become available (incremental: typically 1-5 min) ..."
                aws rds wait db-snapshot-available \
                  --region "$AWS_REGION" \
                  --db-snapshot-identifier "$SNAPSHOT_ID"
                echo "Snapshot ${SNAPSHOT_ID} is available."
                # Prune: keep the 5 newest pre-migration snapshots.
                STALE_SNAPSHOTS=$(aws rds describe-db-snapshots \
                  --region "$AWS_REGION" \
                  --db-instance-identifier "$RDS_INSTANCE_ID" \
                  --snapshot-type manual \
                  --query "DBSnapshots[?starts_with(DBSnapshotIdentifier, '${RDS_INSTANCE_ID}-pre-mig-')] | sort_by(@, &SnapshotCreateTime)[:-5].DBSnapshotIdentifier" \
                  --output text)
                for STALE in $STALE_SNAPSHOTS; do
                  echo "Pruning old pre-migration snapshot ${STALE}"
                  aws rds delete-db-snapshot --region "$AWS_REGION" --db-snapshot-identifier "$STALE" >/dev/null || true
                done
              fi
            fi
            echo "::endgroup::"

            if [ "${SKIP_MIGRATIONS:-false}" = "true" ]; then
              echo "::group::Step 5/6 — alembic upgrade heads (SKIPPED via workflow input)"
              echo "Skipped per workflow_dispatch input."
              echo "::endgroup::"
            else
              echo "::group::Step 5/6 — alembic upgrade heads"
              # `heads` (plural) advances every head — required because we have
              # multi-head divergence in prod (5 heads as of 2026-06-09).
              # PYTHONPATH=/code is required because env.py imports `app.database`;
              # `docker compose exec` doesn't inherit it from uvicorn's env.
              docker compose exec -T -e PYTHONPATH=/code api alembic upgrade heads
              echo "::endgroup::"
            fi

            echo "::group::Step 6/6 — final smoke check"
            curl -fsS http://localhost:8000/api/v1/health
            echo
            echo "Deployed commit:"
            git --no-pager log -1 --oneline
            echo "::endgroup::"

            echo "Deploy succeeded."

        env:
          SKIP_MIGRATIONS: ${{ github.event.inputs.skip_migrations || 'false' }}

      - name: Mark deploy step
        if: success()
        run: echo "Production backend updated to ${{ github.sha }}"
