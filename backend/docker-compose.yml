services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: compass
      POSTGRES_USER: compass
      POSTGRES_PASSWORD: compass_dev_password
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U compass"]
      interval: 5s
      timeout: 3s
      retries: 5

  api:
    build: .
    ports:
      - "8000:8000"
    env_file:
      - .env
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - ./app:/code/app
      # Vonage Voice API private key — read-only bind mount from the host so
      # the key survives container recreates. Without this, every
      # `docker compose up -d --force-recreate api` wipes the key and the
      # Vonage client falls back to a placeholder (no calls are placed). The
      # host file MUST exist at backend/vonage_private.key with 0600 perms;
      # see DEPLOY.md / OPS_RUNBOOK.md for rotation procedure.
      - ./vonage_private.key:/code/vonage_private.key:ro
    restart: unless-stopped
    healthcheck:
      # /api/v1/ready returns 503 (not 200) on DB failure so the orchestrator
      # restarts the container instead of routing requests to a broken worker.
      test: ["CMD-SHELL", "python -c \"import urllib.request, sys; sys.exit(0 if urllib.request.urlopen('http://localhost:8000/api/v1/ready', timeout=3).status == 200 else 1)\""]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s

volumes:
  pgdata:
